name: Build assets

on:
  push:
    paths:
      - '.github/workflows/build-assets.yml'
      - 'resources/assets/**'
      - 'resources/views/**'
      - 'vite.config.ts'
      - 'vite.editor.config.ts'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-assets:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install composer dependencies
        uses: ramsey/composer-install@v4

      - name: Install npm dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Build editor assets
        run: npm run editor:build

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: build assets [skip ci]'
